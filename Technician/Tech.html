<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technician Login</title>
  <link rel="stylesheet" href="Css/tech.css">
</head>

<body>

<header class="navbar">
        <div class="logo" onclick="gotoHome()">
  <p> ServEase </p>
</div>
    </header>


<main class="login-container">
  <div class="login-card">

    <div class="user-icon">🛠️</div>
    <h1>Technician Login</h1>

    <form onsubmit="return technicianLogin(event)">

      <div class="input-group">
        <label>Phone Number <span class="required">*</span></label>
        <input
          type="text"
          id="techPhone"
          placeholder="Enter Phone Number"
          maxlength="10"
          onkeypress="return restrictPhoneInput(event)"
        >
      </div>

      <div class="input-group">
        <label>Password <span class="required">*</span></label>
        <input
          type="password"
          id="techPassword"
          placeholder="Enter Password"
          onkeyup="checkPasswordStrength()"
        >
        <small id="passwordMsg"></small>
      </div>

      <button type="submit" class="btn-primary">Login</button>

      <p class="error-text" id="techError"></p>

    </form>

  </div>

<!-- ================= FOOTER ================= -->
	<footer>
        <p>© 2026 ServEase Services</p>
	</footer>

</main>


<script src="javascript/tech.js"></script>
</body>
</html>
