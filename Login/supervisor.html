<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supervisor Login</title>
  <link rel="stylesheet" href="tech.css">
</head>

<body>

<header class="navbar">
        <div class="logo">
  <p> ServEase </p>
</div>
    </header>

<main class="login-container">
  <div class="login-card">

    <div class="user-icon">🛠️</div>
    <h1>Supervisor Login</h1>

    <form onsubmit="return technicianLogin(event)">

      <div class="input-group">
        <label>Service center Id <span class="required">*</span></label>
        <input
          type="text"
          id="techPhone"
	  maxlength="8"
          placeholder="Enter Service center Id"

        >
      </div>

      <div class="input-group">
        <label>Password <span class="required">*</span></label>
        <input
          type="password"
          id="techPassword"
          placeholder="Enter Password"
          onkeyup="checkPasswordStrength()"
        >
        <small id="passwordMsg"></small>
      </div>

      <button type="submit" class="btn-primary">Login</button>

      <p class="error-text" id="techError"></p>

    </form>

  </div>
</main>
<!-- Footer -->
    <footer>
        <p>© 2026 ServEase Services </p>
    </footer>

<script src="supervisor.js"></script>
</body>
</html>
